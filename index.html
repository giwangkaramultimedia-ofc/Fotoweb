<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fotoweb-Giwangkara-multimedia</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
    <style>
    * {
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    :root { 
        --accent: #ff7eb9; 
        --accent-glow: #ff3b6f;
        --bg: #020617; 
        --panel: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.1);
        --text-muted: #94a3b8;
        --glass: rgba(255,255,255,0.02);
    }
    
    body { 
        background: radial-gradient(ellipse at 20% 30%, #0f0c29, #030712);
        color: #fff; 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        margin: 0; 
        height: 100vh; 
        display: grid;
        grid-template-columns: 360px 1fr 380px; 
        overflow: hidden; 
        backdrop-filter: blur(2px);
    }

    .panel-left, .panel-right { 
        padding: 24px 20px; 
        background: rgba(5, 10, 25, 0.6);
        backdrop-filter: blur(12px);
        display: flex; 
        flex-direction: column; 
        height: 100vh; 
        box-sizing: border-box;
        gap: 20px;
        border-right: 1px solid var(--border);
        border-left: 1px solid var(--border);
    }

    .scroll-area {
        flex: 1;
        overflow-y: auto;
        padding-right: 6px;
        margin-top: 4px;
        scrollbar-width: thin;
    }

    .scroll-area::-webkit-scrollbar { width: 5px; }
    .scroll-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    .cam-container {
        flex-shrink: 0;
        width: 100%; 
        height: 220px; 
        background: #000; 
        border-radius: 28px;
        overflow: hidden; 
        position: relative; 
        border: 2px solid rgba(255,126,185,0.5);
        box-shadow: 0 20px 35px -12px black;
        transition: all 0.2s;
    }
    #camera { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .cd-circle {
        position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
        font-size: 70px; font-weight: 900; background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
        font-family: monospace; z-index: 20; color: var(--accent); text-shadow: 0 0 10px hotpink;
    }

    .stage { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
        position: relative;
    }
    .strip-shadow-box {
        height: 88vh; 
        aspect-ratio: 1/3; 
        background: #fff; 
        padding: 12px;
        border-radius: 32px; 
        box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.2);
        transition: 0.2s;
        position: relative;
    }
    #canvas { height: 100%; width: 100%; border-radius: 24px; cursor: crosshair; touch-action: none; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); }

    .label { 
        font-size: 11px; 
        font-weight: 800; 
        color: var(--accent); 
        letter-spacing: 2.5px; 
        text-transform: uppercase; 
        margin-bottom: 12px; 
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .label::before {
        content: "✦";
        font-size: 14px;
    }
    
    .asset-grid { 
        display: grid; 
        grid-template-columns: repeat(2, 1fr);
        gap: 8px; 
    }

    .chip {
        background: rgba(20, 20, 45, 0.7);
        backdrop-filter: blur(4px);
        border: 1px solid var(--border); 
        border-radius: 14px;
        padding: 8px 6px; 
        cursor: pointer; 
        text-align: center; 
        font-size: 11px; 
        font-weight: 600;
        transition: 0.2s ease;
    }
    .chip:hover { border-color: var(--accent); background: rgba(255,126,185,0.2); transform: scale(0.98); }
    .chip.active { background: linear-gradient(135deg, #ff7eb9, #ff3b6f); color: #fff; border-color: white; box-shadow: 0 4px 12px rgba(255,59,111,0.5); }

    .sticker-cloud { 
        display: grid; 
        grid-template-columns: repeat(5, 1fr);
        gap: 12px; 
        justify-items: center;
        padding: 12px 6px; 
        background: rgba(0,0,0,0.3);
        border-radius: 28px; 
        border: 1px solid rgba(255,255,255,0.1); 
    }
    .sticker-unit { 
        font-size: 28px; 
        cursor: pointer; 
        transition: all 0.15s cubic-bezier(0.2, 1.2, 0.8, 1); 
        user-select: none; 
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    .sticker-unit:hover { transform: scale(1.35) rotate(5deg); text-shadow: 0 0 8px white; }

    .btn-capture { 
        background: linear-gradient(95deg, #ff7eb9, #ff3b6f); 
        color: #fff; 
        border: none; 
        padding: 16px; 
        border-radius: 40px; 
        font-weight: 800; 
        font-size: 16px;
        cursor: pointer; 
        width: 100%; 
        letter-spacing: 1px;
        box-shadow: 0 8px 20px rgba(255,59,111,0.4);
        transition: 0.1s linear;
    }
    .btn-capture:active { transform: scale(0.97); }
    .btn-save { 
        background: rgba(255,255,255,0.95); 
        color: #0a0a2a; 
        border: none; 
        padding: 14px; 
        border-radius: 40px; 
        font-weight: 800; 
        cursor: pointer; 
        width: 100%; 
        margin-bottom: 10px;
        font-size: 14px;
        transition: 0.2s;
    }
    .btn-save:active { transform: scale(0.97); }
    
    #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 200; transition: opacity 0.08s; }
    .brand { font-family: 'Pacifico', cursive; font-size: 32px; background: linear-gradient(135deg, #ffb3d9, #ff7eb9); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 0 0 6px 0; letter-spacing: -0.5px; }
    .badge-pro { font-size: 10px; background: rgba(255,126,185,0.2); border-radius: 20px; padding: 2px 8px; width: fit-content; font-weight: 800; margin-top: -8px; backdrop-filter: blur(4px); }

    .gesture-hint {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(12px);
        padding: 8px 18px;
        border-radius: 40px;
        font-size: 12px;
        color: var(--accent);
        font-weight: 600;
        pointer-events: none;
        z-index: 1000;
        font-family: monospace;
        transition: opacity 0.3s;
        opacity: 0;
        white-space: nowrap;
    }

    @keyframes pulse-glow {
        0% { box-shadow: 0 0 0 0 rgba(255,126,185,0.6); }
        100% { box-shadow: 0 0 0 12px rgba(255,126,185,0); }
    }
    .cam-container:focus-within { animation: pulse-glow 1s infinite; }

    @media (max-width: 1100px) {
        body { grid-template-columns: 300px 1fr 320px; }
        .strip-shadow-box { height: 75vh; }
    }
    @media (max-width: 900px) {
        body { grid-template-columns: 1fr; grid-template-rows: auto auto auto; overflow-y: auto; height: auto; gap: 8px; }
        .panel-left, .panel-right { height: auto; border: none; border-radius: 0; backdrop-filter: blur(20px); }
        .strip-shadow-box { height: 70vh !important; margin: 16px auto; }
        .stage { padding: 12px; }
        .sticker-cloud { grid-template-columns: repeat(6, 1fr); }
        .gesture-hint { font-size: 10px; white-space: nowrap; bottom: 10px; }
    }
</style>
</head>
<body>
<div id="flash"></div>
<div class="gesture-hint" id="gestureHint">✨ 1 jari: geser • 2 jari: putar/ shift + scroll (rotate) • 2 jari cubit (resize) • Double tap: hapus ✨✨</div>

<div class="panel-left">
    <div>
        <div class="brand"> Fotoweb</div>
        <div class="badge-pro">✦ @Giwangkaramultimedia ✦</div>
    </div>
    
    <div class="cam-container">
        <video id="camera" autoplay playsinline muted></video>
        <div id="cd" class="cd-circle">3</div>
    </div>
    
    <button class="btn-capture" id="snapBtn">📸 FOTO 📸</button>

    <span class="label">✨ FILTERS (50+)</span>
    <div class="scroll-area">
        <div class="asset-grid" id="filter-grid"></div>
    </div>
</div>

<div class="stage">
    <div class="strip-shadow-box" id="canvas-wrap">
        <canvas id="canvas"></canvas>
    </div>
</div>

<div class="panel-right">
    <div>
        <span class="label">🖼️ FRAMES (50)</span>
        <div class="scroll-area" style="max-height: 200px;">
            <div class="asset-grid" id="frame-grid"></div>
        </div>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
        <span class="label">💎 STICKERS (80+)</span>
        <div class="scroll-area">
            <div class="sticker-cloud" id="sticker-grid"></div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 12px; flex-shrink: 0;">
            <button id="clearStickersBtn" style="background: rgba(0,0,0,0.5); border:1px solid var(--border); border-radius: 30px; padding: 8px; font-size: 11px; flex:1; color:white;">🗑️ Clear All Stickers</button>
            <button id="resetCanvasBtn" style="background: rgba(0,0,0,0.5); border:1px solid var(--border); border-radius: 30px; padding: 8px; font-size: 11px; flex:1; color:white;">🔄 Reset Canvas</button>
        </div>
    </div>

    <div style="margin-top: auto; padding-top: 14px;">
        <button class="btn-save" id="downloadBtn">💾 DOWNLOAD STRIP (4K READY) 💾</button>
        <p style="font-size: 9px; text-align: center; color: #6b7280; margin-top: 10px;">✨ 1 jari: geser • 2 jari: putar/ shift + scroll (rotate) • 2 jari cubit (resize) • Double tap: hapus ✨</p>
    </div>
</div>

<script>
    (function(){
        // ======================== KONFIGURASI ==========================
        const APP = {
            w: 540, h: 1620,
            slots: [
                {x: 45, y: 70, w: 450, h: 460},
                {x: 45, y: 580, w: 450, h: 460},
                {x: 45, y: 1090, w: 450, h: 460}
            ],
            
            filters: [
                {n:'🌿 Natural', f:'none'},
                {n:'🌙 Moonlight', f:'grayscale(0.8) brightness(1.2) contrast(1.1)'},
                {n:'📽️ Retro Film', f:'sepia(0.7) contrast(1.2) brightness(0.95)'},
                {n:'⚡ Cyberpunk', f:'hue-rotate(170deg) saturate(1.8) brightness(1.05)'},
                {n:'🌸 Cherry Blossom', f:'hue-rotate(-25deg) saturate(1.3) brightness(1.05)'},
                {n:'🌊 Deep Ocean', f:'hue-rotate(200deg) saturate(1.2) brightness(0.9)'},
                {n:'🌈 Vivid Pop', f:'saturate(2.2) contrast(1.1)'},
                {n:'🎞️ Old School', f:'sepia(0.9) grayscale(0.3) contrast(1.0)'},
                {n:'🍃 Mint Dream', f:'hue-rotate(90deg) brightness(1.15) saturate(0.9)'},
                {n:'🌃 Midnight', f:'brightness(0.65) contrast(1.3) saturate(0.8)'},
                {n:'🍑 Peach Fuzz', f:'hue-rotate(-15deg) saturate(1.2) brightness(1.02)'},
                {n:'🎨 Lofi', f:'contrast(0.85) saturate(0.7) brightness(1.05)'},
                {n:'🕶️ Noir', f:'grayscale(1) contrast(1.6)'},
                {n:'❤️ Crimson Love', f:'hue-rotate(330deg) saturate(1.6) brightness(0.95)'},
                {n:'☁️ Cloudy Day', f:'brightness(1.1) contrast(0.9) blur(0.5px)'},
                {n:'💎 Crystal Clear', f:'saturate(1.8) brightness(1.1) contrast(1.05)'},
                {n:'🔥 Inferno', f:'hue-rotate(10deg) saturate(2) contrast(1.2) brightness(1.1)'},
                {n:'❄️ Winter Blue', f:'hue-rotate(200deg) saturate(0.7) brightness(1.15)'},
                {n:'🍂 Autumn', f:'hue-rotate(30deg) sepia(0.3) saturate(1.1)'},
                {n:'🎃 Halloween', f:'hue-rotate(40deg) saturate(1.5) contrast(1.1)'},
                {n:'🧸 Soft Pastel', f:'saturate(0.5) brightness(1.2) contrast(0.95)'},
                {n:'💜 Purple Haze', f:'hue-rotate(280deg) saturate(1.4) brightness(0.95)'},
                {n:'💚 Neon Mint', f:'hue-rotate(85deg) saturate(1.9) brightness(1.05)'},
                {n:'💛 Golden Hour', f:'hue-rotate(-10deg) saturate(1.3) brightness(1.08) sepia(0.2)'},
                {n:'🩵 Aqua', f:'hue-rotate(160deg) saturate(1.3) brightness(1.02)'},
                {n:'💖 Bubblegum', f:'hue-rotate(-15deg) saturate(1.2) brightness(1.1)'},
                {n:'🧡 Tangerine', f:'hue-rotate(20deg) saturate(1.4) brightness(1.05)'},
                {n:'🤍 Monochrome', f:'grayscale(1) brightness(1)'},
                {n:'💙 Electric Blue', f:'hue-rotate(210deg) saturate(1.7) brightness(0.95)'},
                {n:'💚 Matcha', f:'hue-rotate(70deg) saturate(0.8) brightness(1.08)'},
                {n:'🩶 Vintage', f:'sepia(0.5) contrast(0.9) brightness(0.95) grayscale(0.2)'},
                {n:'🤎 Cocoa', f:'sepia(0.4) saturate(0.9) brightness(0.92)'},
                {n:'💎 Sapphire', f:'hue-rotate(220deg) saturate(1.5) brightness(0.9)'},
                {n:'❤️ Ruby', f:'hue-rotate(340deg) saturate(1.7) brightness(1)'},
                {n:'🥑 Avocado', f:'hue-rotate(60deg) saturate(0.8) brightness(1.05)'},
                {n:'🍇 Grape', f:'hue-rotate(270deg) saturate(1.3) brightness(0.98)'},
                {n:'🍒 Cherry', f:'hue-rotate(-20deg) saturate(1.5) brightness(1)'},
                {n:'🍋 Lemon', f:'hue-rotate(55deg) saturate(1.4) brightness(1.1)'},
                {n:'🍉 Watermelon', f:'hue-rotate(-10deg) saturate(1.3) brightness(1.02)'},
                {n:'🌹 Rose Gold', f:'hue-rotate(-5deg) saturate(1.2) brightness(1.05) sepia(0.1)'},
                {n:'✨ Glitter', f:'contrast(1.2) saturate(1.4) brightness(1.15)'},
                {n:'🌌 Galaxy', f:'hue-rotate(280deg) saturate(1.6) brightness(0.85) contrast(1.1)'},
                {n:'🏝️ Tropical', f:'hue-rotate(-40deg) saturate(1.5) brightness(1.08)'},
                {n:'🏔️ Alpine', f:'brightness(1.05) contrast(1.15) saturate(0.9)'},
                {n:'🌅 Sunrise', f:'hue-rotate(-15deg) saturate(1.3) brightness(1.07) sepia(0.1)'},
                {n:'🌄 Sunset', f:'hue-rotate(25deg) saturate(1.4) brightness(1.02) sepia(0.15)'},
                {n:'🎄 Christmas', f:'hue-rotate(-30deg) saturate(1.3) brightness(1.05)'},
                {n:'🎆 Fireworks', f:'saturate(1.7) contrast(1.15) brightness(1.03)'},
                {n:'🌸 Sakura', f:'hue-rotate(-35deg) saturate(0.9) brightness(1.12)'},
                {n:'🍁 Maple', f:'hue-rotate(25deg) saturate(1.2) sepia(0.2) brightness(1.02)'},
                {n:'🎭 Drama', f:'contrast(1.4) brightness(0.9) saturate(1.1)'},
                {n:'📷 Instant', f:'contrast(1.05) saturate(0.9) brightness(1.02) sepia(0.05)'}
            ],
    
            stickers: [
             '🏁', '🚩', '🇮🇩', '🇺🇸', '🇯🇵', '🇰🇷', '🇨🇳', '🇬🇧', '👍', '👎', '👌', '✌️', '🤞', '🤘', '🤙',
    '👋', '🤚', '🖐️', '✋', '👏', '🙌', '💪', '👂', '👃', '👀', '👄', '👅',
    '😀', '😃', '😄', '😁', '😆', '😅', '😂', '🤣', '☺️', '😊', '😇', '🙂', '🙃', '😉', '😌',
    '😍', '🥰', '😘', '😗', '😙', '😚', '😋', '😛', '😝', '😜', '🤪', '🤨', '🧐', '🤓', '😎',
    '🤩', '🥳', '😏', '😒', '😞', '😔', '😟', '😕', '🙁', '☹️', '😣', '😖', '😫', '😩', '🥺',
    '😢', '😭', '😤', '😠', '😡', '🤬', '🤯', '😳', '🥵', '🥶', '😱', '😨', '😰', '😥', '😓',
    '🤗', '🤔', '🤭', '🤫', '🤥', '😶', '😐', '😑', '😬', '🙄', '😯', '😦', '😧', '😮', '😲',
    '🥱', '😴', '🤤', '😪', '😵', '🤐', '🥴', '🤢', '🤮', '🤧', '😷', '🤒', '🤕', '🤑', '🤠',
    '👻', '💀', '👽', '👾', '🤖', '🎃', '😈', '👿', '💩', '😺', '😸', '😹', '😻', '😼', '😽', '🙀', '😿', '😾'
            ],
    
            frames: Array.from({length: 50}, (_, i) => {
                const colors = ['#ffffff','#0f172a','#ff7eb9','#38bdf8','#a3e635','#fbbf24','#c084fc','#f472b6','#e2e8f0','#1e293b','#7f1d1d','#065f46','#312e81','#6b21a5','#b45309','#0d9488','#dc2626','#4f46e5','#ec4899','#f97316'];
                const names = ['Classic White','Night Mode','Neon Pink','Sky Blue','Lime Pop','Golden','Purple Haze','Rose','Mist Gray','Dark Navy','Crimson','Emerald','Deep Indigo','Royal Purple','Amber','Teal','Ruby','Electric Indigo','Hot Magenta','Tangerine'];
                let nameIdx = i % names.length;
                let color = colors[i % colors.length];
                let textColor = (i % 3 === 0 || color === '#ffffff' || color === '#e2e8f0') ? '#111' : '#fff';
                return { n: names[nameIdx] + (Math.floor(i/names.length)+1), c: color, t: textColor };
            })
        };
    
        let photos = [];
        let curFilter = 'none';
        let curFrame = null;
        let stickers = [];         // {e, x, y, s, r}  r = rotation in degrees
        let activeDrag = null;
        let hintTimeout = null;
    
        const video = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wrap = document.getElementById('canvas-wrap');
        const gestureHint = document.getElementById('gestureHint');
        
        const filterGrid = document.getElementById('filter-grid');
        const stickerGrid = document.getElementById('sticker-grid');
        const frameGrid = document.getElementById('frame-grid');
        const snapBtn = document.getElementById('snapBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetCanvasBtn = document.getElementById('resetCanvasBtn');
        const clearStickersBtn = document.getElementById('clearStickersBtn');
    
        function showHint(message) {
            if (message) gestureHint.innerText = message;
            gestureHint.style.opacity = '1';
            if (hintTimeout) clearTimeout(hintTimeout);
            hintTimeout = setTimeout(() => {
                gestureHint.style.opacity = '0';
                setTimeout(() => {
                    gestureHint.innerText = '✨ 1 jari: geser • 2 jari: putar/ shift + scroll (rotate) • 2 jari cubit (resize) • Double tap: hapus ✨';
                }, 300);
            }, 1800);
        }
    
        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } })
            .then(stream => { video.srcObject = stream; video.play(); })
            .catch(err => { console.warn(err); alert("Izin kamera diperlukan untuk fitur foto."); });
    
        function render() {
            canvas.width = APP.w;
            canvas.height = APP.h;
            ctx.clearRect(0, 0, APP.w, APP.h);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, APP.w, APP.h);
            
            for(let i = 0; i < photos.length; i++) {
                const p = photos[i];
                const slot = APP.slots[i];
                if(!p.img) continue;
                ctx.save();
                if(p.filter && p.filter !== 'none') ctx.filter = p.filter;
                const scale = Math.max(slot.w / p.img.width, slot.h / p.img.height);
                const dw = p.img.width * scale;
                const dh = p.img.height * scale;
                const dx = slot.x - (dw - slot.w) / 2;
                const dy = slot.y - (dh - slot.h) / 2;
                ctx.beginPath();
                ctx.roundRect(slot.x, slot.y, slot.w, slot.h, 18);
                ctx.clip();
                ctx.drawImage(p.img, dx, dy, dw, dh);
                ctx.restore();
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = "#ddd";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(slot.x, slot.y, slot.w, slot.h, 18);
                ctx.stroke();
                ctx.restore();
            }
    
            if(curFrame) {
                ctx.drawImage(curFrame, 0, 0);
            } else {
                ctx.strokeStyle = "#ff7eb9";
                ctx.lineWidth = 3;
                ctx.strokeRect(12, 12, APP.w-24, APP.h-24);
                ctx.font = "500 14px 'Plus Jakarta Sans'";
                ctx.fillStyle = "#b0b3c0";
                ctx.textAlign = "center";
                ctx.fillText("✦ G-Multimedia Fotoweb✦", APP.w/2, APP.h-28);
            }
    
            // Render stickers DENGAN ROTASI
            stickers.forEach(st => {
                ctx.save();
                ctx.translate(st.x, st.y);
                if (st.r) {
                    ctx.rotate(st.r * Math.PI / 180);
                }
                const fontSize = Math.floor(68 * (st.s || 1));
                ctx.font = `${fontSize}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#000000";
                ctx.fillText(st.e, 2, 2);
                ctx.fillStyle = "#ffffff";
                ctx.fillText(st.e, -1, -1);
                ctx.fillStyle = "#000000";
                ctx.fillText(st.e, 0, 0);
                ctx.fillStyle = "white";
                ctx.fillText(st.e, 0, 0);
                ctx.fillStyle = st.e === '💎' ? "#ffd700" : "#ffffff";
                ctx.fillText(st.e, 0, 0);
                ctx.restore();
            });
        }
    
        async function capturePhotoToSlot(index, filterApplied) {
            if (!video.videoWidth) return null;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.translate(tempCanvas.width, 0);
            tCtx.scale(-1, 1);
            tCtx.drawImage(video, 0, 0);
            return { img: tempCanvas, filter: filterApplied };
        }
    
        async function startPhotoSession() {
            if(photos.length >= 3) {
                photos = [];
                stickers = stickers.filter(s => true);
                curFrame = null;
            }
            for(let i = 0; i < 3; i++) {
                const cdDiv = document.getElementById('cd');
                cdDiv.style.display = 'flex';
                for(let c=3; c>0; c--) {
                    cdDiv.innerText = c;
                    await new Promise(r => setTimeout(r, 700));
                }
                cdDiv.style.display = 'none';
                const flashDiv = document.getElementById('flash');
                flashDiv.style.opacity = '1';
                setTimeout(() => flashDiv.style.opacity = '0', 80);
                
                const captured = await capturePhotoToSlot(i, curFilter);
                if(captured) {
                    if(photos.length <= i) photos.push(captured);
                    else photos[i] = captured;
                    render();
                }
                if(i < 2) await new Promise(r => setTimeout(r, 400));
            }
            render();
        }
    
        function downloadPhoto() {
            if(photos.length === 0) {
                alert("Ambil foto dulu dengan tombol SNAP 3 POSES!");
                return;
            }
            const link = document.createElement('a');
            link.download = `fotoweb_azka_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    
        function resetApp() {
            photos = [];
            stickers = [];
            curFrame = null;
            render();
            showHint('🔄 Semua direset!');
        }
    
        function clearAllStickers() {
            stickers = [];
            render();
            showHint('🗑️ Semua sticker dihapus!');
        }
    
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.min(Math.max(x, 20), canvas.width - 20);
            y = Math.min(Math.max(y, 20), canvas.height - 20);
            return { x, y };
        }
    
        // ========== GESTURE 2 JARI UNTUK ROTATE + RESIZE DI HP ==========
        let activeTwoFinger = false;
        let twoFingerStartDist = 0, twoFingerStartAngle = 0;
        let twoFingerStartSize = 1, twoFingerStartRot = 0;
        let targetStickerForGesture = null;
    
        function getTouchAngle(touches) {
            if (touches.length < 2) return 0;
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.atan2(dy, dx) * 180 / Math.PI;
        }
    
        function getTouchDistance(touches) {
            if (touches.length < 2) return 0;
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.hypot(dx, dy);
        }
    
        function handleTouchStart(e) {
            // JIKA 2 JARI (ROTASI + RESIZE)
            if (e.touches.length === 2) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const midX = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left) * scaleX;
                const midY = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top) * scaleY;
                
                for (let s of stickers) {
                    if (Math.hypot(s.x - midX, s.y - midY) < 65 * (s.s || 1)) {
                        targetStickerForGesture = s;
                        twoFingerStartDist = getTouchDistance(e.touches);
                        twoFingerStartAngle = getTouchAngle(e.touches);
                        twoFingerStartSize = s.s || 1;
                        twoFingerStartRot = s.r || 0;
                        activeTwoFinger = true;
                        break;
                    }
                }
            } 
            // JIKA 1 JARI (DRAG/MOVE)
            else if (e.touches.length === 1) {
                const { x, y } = getCanvasCoords(e);
                for (let i = stickers.length - 1; i >= 0; i--) {
                    const s = stickers[i];
                    if (Math.hypot(s.x - x, s.y - y) < 55 * (s.s || 1)) {
                        activeDrag = s;
                        break;
                    }
                }
            }
        }
    
        function handleTouchMove(e) {
            // PROSES 2 JARI: RESIZE + ROTATE BERSAMAAN
            if (activeTwoFinger && targetStickerForGesture && e.touches.length === 2) {
                e.preventDefault();
                const newDist = getTouchDistance(e.touches);
                const newAngle = getTouchAngle(e.touches);
                
                // RESIZE (pinch zoom)
                const scaleFactor = newDist / twoFingerStartDist;
                let newSize = twoFingerStartSize * scaleFactor;
                newSize = Math.min(3.5, Math.max(0.35, newSize));
                if (Math.abs(newSize - targetStickerForGesture.s) > 0.01) {
                    targetStickerForGesture.s = newSize;
                }
                
                // ROTATE (putar 2 jari)
                let angleDiff = newAngle - twoFingerStartAngle;
                let newRot = (twoFingerStartRot + angleDiff) % 360;
                if (Math.abs(angleDiff) > 0.5) {
                    targetStickerForGesture.r = newRot;
                }
                render();
            } 
            // PROSES 1 JARI (DRAG)
            else if (activeDrag) {
                e.preventDefault();
                const { x, y } = getCanvasCoords(e);
                activeDrag.x = x;
                activeDrag.y = y;
                render();
            }
        }
    
        function handleTouchEnd(e) {
            if (activeTwoFinger) {
                activeTwoFinger = false;
                targetStickerForGesture = null;
            }
            if (activeDrag) activeDrag = null;
        }
    
        // ========== DESKTOP: MOUSE + WHEEL (Shift untuk rotate) ==========
        function handleMouseDown(e) {
            const { x, y } = getCanvasCoords(e);
            for (let i = stickers.length - 1; i >= 0; i--) {
                const s = stickers[i];
                if (Math.hypot(s.x - x, s.y - y) < 55 * (s.s || 1)) {
                    activeDrag = s;
                    break;
                }
            }
        }
    
        function handleMouseMove(e) {
            if (activeDrag) {
                const { x, y } = getCanvasCoords(e);
                activeDrag.x = x;
                activeDrag.y = y;
                render();
            }
        }
    
        function handleMouseUp() {
            activeDrag = null;
        }
    
        function handleWheel(e) {
            const { x, y } = getCanvasCoords(e);
            let targetSticker = null;
            for (let s of stickers) {
                if (Math.hypot(s.x - x, s.y - y) < 60 * (s.s || 1)) {
                    targetSticker = s;
                    break;
                }
            }
            if (targetSticker) {
                e.preventDefault();
                // Shift + scroll = rotate (untuk desktop)
                if (e.shiftKey) {
                    const delta = e.deltaY > 0 ? -5 : 5;
                    let newRot = (targetSticker.r || 0) + delta;
                    targetSticker.r = newRot % 360;
                    showHint('🔄 Rotate: ' + Math.round(targetSticker.r) + '°');
                    render();
                } else {
                    const delta = e.deltaY > 0 ? -0.08 : 0.08;
                    let newSize = (targetSticker.s || 1) + delta;
                    newSize = Math.min(3.5, Math.max(0.35, newSize));
                    if (Math.abs(newSize - (targetSticker.s || 1)) > 0.01) {
                        targetSticker.s = newSize;
                        showHint('🔍 Resize: ' + Math.round(newSize * 100) / 100 + 'x');
                        render();
                    }
                }
            }
        }
    
        function handleDoubleClick(e) {
            const { x, y } = getCanvasCoords(e);
            const idx = stickers.findIndex(s => Math.hypot(s.x - x, s.y - y) < 55 * (s.s || 1));
            if (idx !== -1) {
                stickers.splice(idx, 1);
                showHint('🗑️ Sticker dihapus!');
                render();
                e.preventDefault();
            }
        }
    
        function buildUI() {
            APP.filters.forEach(f => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerText = f.n;
                chip.onclick = () => {
                    curFilter = f.f;
                    if(video) video.style.filter = f.f;
                    document.querySelectorAll('#filter-grid .chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    for(let i=0;i<photos.length;i++) {
                        if(photos[i]) photos[i].filter = curFilter;
                    }
                    render();
                };
                filterGrid.appendChild(chip);
            });
    
            APP.stickers.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'sticker-unit';
                div.innerText = emoji;
                div.onclick = (e) => {
                    e.stopPropagation();
                    stickers.push({ 
                        e: emoji, 
                        x: APP.w/2 + (Math.random() - 0.5) * 140, 
                        y: APP.h/2 + (Math.random() - 0.5) * 180, 
                        s: 1,
                        r: 0 
                    });
                    showHint('✨ Sticker ditambahkan! Gunakan 2 jari untuk rotate/resize ✨');
                    render();
                };
                stickerGrid.appendChild(div);
            });
    
            APP.frames.forEach(fr => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerText = fr.n;
                chip.onclick = () => {
                    const frameCanvas = document.createElement('canvas');
                    frameCanvas.width = APP.w;
                    frameCanvas.height = APP.h;
                    const fctx = frameCanvas.getContext('2d');
                    fctx.fillStyle = fr.c;
                    fctx.fillRect(0, 0, APP.w, APP.h);
                    fctx.globalCompositeOperation = 'destination-out';
                    APP.slots.forEach(slot => {
                        fctx.beginPath();
                        fctx.roundRect(slot.x, slot.y, slot.w, slot.h, 18);
                        fctx.fill();
                    });
                    fctx.globalCompositeOperation = 'source-over';
                    fctx.fillStyle = fr.t;
                    fctx.font = 'bold 18px "Plus Jakarta Sans"';
                    fctx.textAlign = 'center';
                    fctx.fillText('✦ G-Multimedia Fotoweb✦', APP.w/2, APP.h - 26);
                    fctx.font = '10px monospace';
                    fctx.fillStyle = fr.t === '#fff' ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)';
                    fctx.fillText('photobooth strip', APP.w/2, APP.h - 12);
                    curFrame = frameCanvas;
                    render();
                    document.querySelectorAll('#frame-grid .chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                };
                frameGrid.appendChild(chip);
            });
        }
    
        function attachEvents() {
            // Touch events untuk HP (2 jari rotate + resize)
            wrap.addEventListener('touchstart', handleTouchStart, { passive: false });
            wrap.addEventListener('touchmove', handleTouchMove, { passive: false });
            wrap.addEventListener('touchend', handleTouchEnd);
            wrap.addEventListener('touchcancel', handleTouchEnd);
            
            // Mouse events untuk Desktop
            wrap.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            
            // Wheel untuk resize/rotate (Desktop + laptop)
            wrap.addEventListener('wheel', handleWheel, { passive: false });
            
            // Double tap/click untuk hapus
            wrap.addEventListener('dblclick', handleDoubleClick);
            
            // Tombol
            snapBtn.onclick = startPhotoSession;
            downloadBtn.onclick = downloadPhoto;
            resetCanvasBtn.onclick = resetApp;
            clearStickersBtn.onclick = clearAllStickers;
        }
    
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
    
        buildUI();
        attachEvents();
        render();
    })();
</script>
